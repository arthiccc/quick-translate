<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      width: 280px;
      padding: 16px;
      background: #fff;
      color: #333;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }
    
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    
    .header .logo {
      width: 24px;
      height: 24px;
      background: #4285f4;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 14px;
    }
    
    .setting {
      margin-bottom: 14px;
    }
    
    .setting label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 500;
    }
    
    .setting select,
    .setting input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
    }
    
    .setting select:focus,
    .setting input:focus {
      outline: none;
      border-color: #4285f4;
    }
    
    .toggle-setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    
    .toggle-setting .label {
      font-size: 13px;
    }
    
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }
    
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #ccc;
      border-radius: 24px;
      transition: 0.2s;
    }
    
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    
    .toggle input:checked + .toggle-slider {
      background: #4285f4;
    }
    
    .toggle input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }
    
    .status {
      font-size: 11px;
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    
    .status.success {
      background: #e8f5e9;
      color: #2e7d32;
    }
    
    .status.error {
      background: #ffebee;
      color: #c62828;
    }
    
    .status.pending {
      background: #fff3e0;
      color: #ef6c00;
    }
    
    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      font-size: 11px;
      color: #888;
      text-align: center;
    }
    
    .footer a {
      color: #4285f4;
      text-decoration: none;
    }
    
    .shortcut-hint {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">QT</div>
    <h1>Quick Translate</h1>
  </div>
  
  <div id="status" class="status pending">
    Checking Chrome AI availability...
  </div>
  
  <div class="setting">
    <label for="targetLang">Target Language</label>
    <select id="targetLang">
      <option value="en">English</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="it">Italian</option>
      <option value="pt">Portuguese</option>
      <option value="ru">Russian</option>
      <option value="ja">Japanese</option>
      <option value="ko">Korean</option>
      <option value="zh-CN">Chinese (Simplified)</option>
      <option value="zh-TW">Chinese (Traditional)</option>
      <option value="ar">Arabic</option>
      <option value="hi">Hindi</option>
      <option value="nl">Dutch</option>
      <option value="pl">Polish</option>
      <option value="tr">Turkish</option>
      <option value="vi">Vietnamese</option>
      <option value="th">Thai</option>
      <option value="id">Indonesian</option>
    </select>
  </div>
  
  <div class="toggle-setting">
    <span class="label">Hover to translate</span>
    <label class="toggle">
      <input type="checkbox" id="hoverEnabled" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
  
  <div class="toggle-setting">
    <span class="label">Bilingual mode (page)</span>
    <label class="toggle">
      <input type="checkbox" id="bilingual" checked>
      <span class="toggle-slider"></span>
    </label>
  </div>
  
  <div class="setting">
    <label for="hoverDelay">Hover delay (ms)</label>
    <input type="number" id="hoverDelay" value="300" min="100" max="2000" step="100">
    <div class="shortcut-hint">Lower = faster, higher = less accidental triggers</div>
  </div>
  
  <div class="footer">
    Right-click for context menu options
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
